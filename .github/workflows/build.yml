name: Build and deploy config

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: true

permissions:
  id-token: write
  contents: read

env:
  BUCKET_NAME: "kelwing-nix-cache-483691633045-us-east-1-an"
  AWS_REGION: "us-east-1"

jobs:
  build-server-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      nix_store_path: ${{ steps.build.outputs.nix_store_path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::483691633045:role/nix-actions-cache
          role-session-name: ${{ github.run_id }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GH_TOKEN }}
            extra-substituters = s3://${{ env.BUCKET_NAME }}?region=${{ env.AWS_REGION }}
            extra-trusted-substituters = s3://${{ env.BUCKET_NAME }}?region=${{ env.AWS_REGION }}
            extra-trusted-public-keys = ${{ vars.NIX_PUBLIC_KEY }}

      - name: Configure AWS credentials for Nix daemon
        run: |
          sudo mkdir -p /root/.aws
          sudo tee /root/.aws/credentials > /dev/null <<CREDS
          [default]
          aws_access_key_id=$AWS_ACCESS_KEY_ID
          aws_secret_access_key=$AWS_SECRET_ACCESS_KEY
          aws_session_token=$AWS_SESSION_TOKEN
          CREDS

      - name: Build config
        id: build
        run: |
          set -eo pipefail
          outpath=$(nix build .#vidar --accept-flake-config --no-link --json | jq -r '.[].outputs.out')
          echo "::debug::Derivation output path: ${outpath}"
          echo "nix_store_path=${outpath}" >> "$GITHUB_OUTPUT"

      - name: Push to S3 cache
        run: |
          nix copy --to "s3://${{ env.BUCKET_NAME }}?region=${{ env.AWS_REGION }}" ${{ steps.build.outputs.nix_store_path }}
        env:
          AWS_SIGNING_KEY: ${{ secrets.NIX_SIGNING_KEY }}

  deploy-server-config:
    runs-on: ubuntu-latest
    needs: build-server-config
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::483691633045:role/nix-actions-cache
          role-session-name: ${{ github.run_id }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GH_TOKEN }}
            extra-substituters = s3://${{ env.BUCKET_NAME }}?region=${{ env.AWS_REGION }}
            extra-trusted-substituters = s3://${{ env.BUCKET_NAME }}?region=${{ env.AWS_REGION }}
            extra-trusted-public-keys = ${{ vars.NIX_PUBLIC_KEY }}

      - name: Configure AWS credentials for Nix daemon
        run: |
          sudo mkdir -p /root/.aws
          sudo tee /root/.aws/credentials > /dev/null <<CREDS
          [default]
          aws_access_key_id=$AWS_ACCESS_KEY_ID
          aws_secret_access_key=$AWS_SECRET_ACCESS_KEY
          aws_session_token=$AWS_SESSION_TOKEN
          CREDS

      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to authorized keys
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy config to server
        run: |
          nix copy --from "s3://${{ env.BUCKET_NAME }}?region=${{ env.AWS_REGION }}" --to ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} ${{ needs.build-server-config.outputs.nix_store_path }}

      - name: Apply config
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "sudo ${NIX_STORE_PATH}/bin/switch-to-configuration switch"
        env:
          NIX_STORE_PATH: ${{ needs.build-server-config.outputs.nix_store_path }}
